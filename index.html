  _newsQuizInFlight=true;
  await generateNewsQuiz({topic,raw:raw.slice(0,40000),section,count});
}

function buildNewsPrompt(sec, count){
  return `You are an expert AFCAT (Air Force Common Admission Test) question setter specialising in the ${sec.label} section, especially Current Affairs and General Awareness.

You will receive one or more news articles or current-affairs passages. Your task is to generate exactly ${count} high-quality multiple-choice questions based ONLY on facts explicitly stated in the given text.

FOCUS on these high-value GA question types:
- Appointments & resignations (who became what, which organisation)
- Awards & recognitions (who won what, given by whom)
- Government schemes & policies (name, ministry, beneficiary, objective)
- International summits & agreements (name, location, participants)
- Defence & space milestones (missions, exercises, firsts)
- Sports achievements (who won what championship, venue, country)
- Key numbers & dates (ranks, indices, dates of events)
- Places in news (why a location is significant)

STRICT RULES:
1. Every question and every answer option must come ONLY from the provided text — no outside facts.
2. Each question must have EXACTLY 4 options and EXACTLY 1 correct answer.
3. Distractors must be plausible — other names/places/dates mentioned in the same text, not random inventions.
4. Write a short explanation (≤20 words) stating the specific fact from the text.
5. Write a wrongReason (≤20 words) for the most common mistake a student would make.
6. Never repeat the same fact across two questions.
7. Vary question types — mix "who", "what", "where", "which ministry/organisation" formats.

Respond with ONLY a minified JSON array — no markdown, no preamble.
Schema: [{"q":"question","options":["a","b","c","d"],"correct":0,"explanation":"why correct","wrongReason":"common trap"}]`;
}

async function generateNewsQuiz({topic,raw,section,count}){
  state.screen='generating';
  const sec=sectionInfo(section);
  renderGenerating({topic,section},'extracting facts and crafting GA questions…');
  try{
    const chunks=chunkContent(raw,8000,600);
    const perChunk=Math.ceil(count/chunks.length);
    let allCleaned=[];
    let batchError=null;
    for(let ci=0;ci<chunks.length;ci++){
      if(chunks.length>1) renderGenerating({topic,section},`batch ${ci+1} of ${chunks.length}…`);
      try{
        const data=await callClaude({
          max_tokens:3500,
          system:buildNewsPrompt(sec,perChunk),
          messages:[{role:'user',content:`Quiz name: ${topic}

News content (part ${ci+1}/${chunks.length}):
${chunks[ci]}`}]
        });
        const raw2=(data.content||[]).map(b=>b.text||'').join('');
        allCleaned.push(...cleanQuestions(parseQuestionJson(raw2)));
      }catch(e){ batchError=e; }
    }
    const seen=new Set();
    allCleaned=allCleaned.filter(q=>{ if(seen.has(q.q)) return false; seen.add(q.q); return true; }).slice(0,count);
    if(allCleaned.length===0) throw batchError||new Error('No questions could be generated. Make sure the text contains specific facts, names, dates, or numbers.');
    const id=uid();
    const quiz={id,section,topic,content:raw,count,createdAt:Date.now(),questions:allCleaned,usedQuestions:allCleaned.map(q=>q.q),source:'news',stats:{attempts:0,bestScore:0,lastScore:null,lastAt:null}};
    await safeSet(`quiz-${id}`,quiz);
    state.quizzesIndex=[{id,section,topic,questionCount:allCleaned.length,createdAt:quiz.createdAt,attempts:0,bestScore:0,lastAt:null,source:'news'},...state.quizzesIndex];
    await safeSet('quizzes-index',state.quizzesIndex);
    startQuiz(quiz,true);
  }catch(err){
    state.newsQuizDraft={...(state.newsQuizDraft||{}),error:friendlyError(err,false)};
    state.screen='newsquiz';
    renderNewsQuiz();
  } finally {
    _newsQuizInFlight=false;
  }
}

/* ====== URL / VIDEO → QUIZ ====== */
function goUrlQuiz(){
  state.screen='urlquiz';
  state.urlQuizDraft={topic:'',raw:'',section:'general-awareness',sourceType:'youtube',error:null};
  renderUrlQuiz();
}

let _urlQuizSection='general-awareness';
let _urlSourceType='youtube';

function renderUrlQuiz(){
  const d=state.urlQuizDraft||{topic:'',raw:'',section:'general-awareness',sourceType:'youtube',error:null};
  _urlQuizSection=d.section||'general-awareness';
  _urlSourceType=d.sourceType||'youtube';

  const sourceTypes=[
    {key:'youtube', label:'🎥 YouTube Transcript', hint:'Copy transcript from YouTube (3-dot menu → Open transcript → copy all text)'},
    {key:'article', label:'📄 Webpage / Article', hint:'Copy the full text of any article, Wikipedia page, or AFCAT prep website'},
    {key:'video',   label:'🎙 Lecture Notes / Summary', hint:'Paste notes from any online lecture, podcast summary, or study video'},
  ];

  document.getElementById('app').innerHTML=`
    ${headerHtml('goDashboard')}
    <div class="panel-block">
      <div class="screen-title">🔗 URL / VIDEO → QUIZ</div>
      <p style="font-size:13px;color:var(--text-dim);margin:0 0 20px;line-height:1.6;">
        Paste text from any source — YouTube transcript, article, lecture notes — and the AI will
        identify the most exam-relevant facts and build AFCAT-style questions from them.
      </p>
      ${d.error?`<div class="error-banner"><div style="font-weight:700;margin-bottom:4px;">⚠ Issue</div><div>${escapeHtml(d.error)}</div></div>`:''}
      <div class="field">
        <label class="field-label">Source type</label>
        <div class="chip-row" id="urlquiz-source-chips">
          ${sourceTypes.map(t=>`<button type="button" class="chip ${t.key===_urlSourceType?'active':''}" style="--acc:var(--purple)" onclick="pickUrlSourceType('${t.key}')">${t.label}</button>`).join('')}
        </div>
        <div class="field-hint" id="urlquiz-source-hint">${sourceTypes.find(t=>t.key===_urlSourceType)?.hint||''}</div>
      </div>
      <div class="field">
        <label class="field-label">Section</label>
        <div class="chip-row" id="urlquiz-section-chips">
          ${SECTIONS.map(s=>`<button type="button" class="chip ${s.key===_urlQuizSection?'active':''}" style="--acc:${s.acc}" onclick="pickUrlQuizSection('${s.key}')">${s.code} · ${s.label}</button>`).join('')}
        </div>
      </div>
      <div class="field">
        <label class="field-label">Quiz name</label>
        <input id="urlquiz-topic" class="input" type="text" placeholder='e.g. "Indian History — BYJU'S lecture", "Maths tricks video"' value="${escapeHtml(d.topic)}" />
      </div>
      <div class="field">
        <label class="field-label">Pasted content</label>
        <textarea id="urlquiz-content" class="textarea" style="min-height:300px;" placeholder="Paste the text here. For YouTube:
1. Open the video on YouTube
2. Click the 3-dot menu (⋯) below the video
3. Click 'Open transcript'
4. Select all the transcript text and paste it here

For articles or webpages — just select all text on the page and paste.">${escapeHtml(d.raw)}</textarea>
        <div class="char-count" id="urlquiz-char-count">${(d.raw||'').length.toLocaleString()} / 40,000 characters</div>
      </div>
      <div class="field">
        <label class="field-label">Max questions (4–20)</label>
        <div class="count-row">
          <div class="count-stepper">
            <button type="button" onclick="stepUrlCount(-1)">&minus;</button>
            <span class="count-val" id="urlquiz-count-val">10</span>
            <button type="button" onclick="stepUrlCount(1)">+</button>
          </div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="submitUrlQuiz()">Extract &amp; generate questions →</button>
    </div>`;

  document.getElementById('urlquiz-content').addEventListener('input',function(){
    const len=this.value.length;
    const el=document.getElementById('urlquiz-char-count');
    el.textContent=len.toLocaleString()+' / 40,000 characters';
    el.className='char-count'+(len>38000?' warn':len>80?' ok':'');
  });
}

function pickUrlSourceType(key){
  _urlSourceType=key;
  state.urlQuizDraft={...state.urlQuizDraft,sourceType:key};
  document.querySelectorAll('#urlquiz-source-chips .chip').forEach((el,i)=>{
    const keys=['youtube','article','video'];
    el.classList.toggle('active',keys[i]===key);
  });
  const hints={youtube:'Copy transcript from YouTube (3-dot menu → Open transcript → copy all text)',article:'Copy the full text of any article, Wikipedia page, or AFCAT prep website',video:'Paste notes from any online lecture, podcast summary, or study video'};
  const el=document.getElementById('urlquiz-source-hint');
  if(el) el.textContent=hints[key]||'';
}

function pickUrlQuizSection(key){
  _urlQuizSection=key;
  state.urlQuizDraft={...state.urlQuizDraft,section:key};
  document.querySelectorAll('#urlquiz-section-chips .chip').forEach((el,i)=>{
    el.classList.toggle('active',SECTIONS[i].key===key);
  });
}

function stepUrlCount(delta){
  const el=document.getElementById('urlquiz-count-val');
  el.textContent=Math.max(4,Math.min(20,(parseInt(el.textContent,10)||10)+delta));
}

let _urlQuizInFlight=false;
async function submitUrlQuiz(){
  if(_urlQuizInFlight) return;
  const topic=document.getElementById('urlquiz-topic').value.trim();
  const raw=document.getElementById('urlquiz-content').value.trim();
  const section=_urlQuizSection;
  const sourceType=_urlSourceType;
  const count=parseInt(document.getElementById('urlquiz-count-val').textContent,10)||10;
  if(!topic){ state.urlQuizDraft={topic,raw,section,sourceType,error:'Give this quiz a name first.'}; renderUrlQuiz(); return; }
  if(raw.length<60){ state.urlQuizDraft={topic,raw,section,sourceType,error:'Paste some content first — at least a short paragraph.'}; renderUrlQuiz(); return; }
  _urlQuizInFlight=true;
  await generateUrlQuiz({topic,raw:raw.slice(0,40000),section,count,sourceType});
}

function buildUrlPrompt(sec, count, sourceType){
  const sourceCtx={
    youtube:`You are processing a YouTube video transcript — the text may include filler words, timestamps, and informal speech. Extract the educational content and ignore filler.`,
    article:`You are processing an article or webpage. Extract the key factual claims, definitions, data points, and named entities.`,
    video:`You are processing lecture notes or a video/podcast summary. Focus on key concepts, definitions, examples, and facts.`
  }[sourceType]||'';

  return `You are a strict AFCAT (Air Force Common Admission Test) question setter for the ${sec.label} section.

${sourceCtx}

Your task: generate exactly ${count} exam-quality multiple-choice questions based ONLY on facts, concepts, and information explicitly present in the provided content. Do NOT add outside knowledge.

STRICT RULES:
1. Every question and every option must be traceable to specific content in the provided text.
2. Each question must have EXACTLY 4 options and EXACTLY 1 correct answer.
3. Distractor options must be plausible — draw from other names, numbers, or terms in the same text.
4. Prefer questions about: key definitions, named concepts, specific facts, cause-effect relationships, sequences, or comparisons explicitly described in the text.
5. Write a short explanation (≤20 words) citing the fact that makes the answer correct.
6. Write a wrongReason (≤20 words) for the most common mistake a student would make.
7. Vary question difficulty — mix straightforward recall and slightly tricky application questions.

Respond with ONLY a minified JSON array — no markdown, no preamble.
Schema: [{"q":"question","options":["a","b","c","d"],"correct":0,"explanation":"why correct","wrongReason":"common trap"}]`;
}

async function generateUrlQuiz({topic,raw,section,count,sourceType}){
  state.screen='generating';
  const sec=sectionInfo(section);
  const loadMsg=sourceType==='youtube'?'reading transcript and picking key facts…':sourceType==='article'?'scanning article for exam-relevant facts…':'extracting key concepts from content…';
  renderGenerating({topic,section},loadMsg);
  try{
    const chunks=chunkContent(raw,8000,600);
    const perChunk=Math.ceil(count/chunks.length);
    let allCleaned=[];
    let batchError=null;
    for(let ci=0;ci<chunks.length;ci++){
      if(chunks.length>1) renderGenerating({topic,section},`batch ${ci+1} of ${chunks.length}…`);
      try{
        const data=await callClaude({
          max_tokens:3500,
          system:buildUrlPrompt(sec,perChunk,sourceType),
          messages:[{role:'user',content:`Quiz name: ${topic}

Content (part ${ci+1}/${chunks.length}):
${chunks[ci]}`}]
        });
        const raw2=(data.content||[]).map(b=>b.text||'').join('');
        allCleaned.push(...cleanQuestions(parseQuestionJson(raw2)));
      }catch(e){ batchError=e; }
    }
    const seen=new Set();
    allCleaned=allCleaned.filter(q=>{ if(seen.has(q.q)) return false; seen.add(q.q); return true; }).slice(0,count);
    if(allCleaned.length===0) throw batchError||new Error('No questions could be generated. Make sure the content has enough specific facts, definitions, or named items.');
    const id=uid();
    const quiz={id,section,topic,content:raw,count,createdAt:Date.now(),questions:allCleaned,usedQuestions:allCleaned.map(q=>q.q),source:'url',stats:{attempts:0,bestScore:0,lastScore:null,lastAt:null}};
    await safeSet(`quiz-${id}`,quiz);
    state.quizzesIndex=[{id,section,topic,questionCount:allCleaned.length,createdAt:quiz.createdAt,attempts:0,bestScore:0,lastAt:null,source:'url'},...state.quizzesIndex];
    await safeSet('quizzes-index',state.quizzesIndex);
    startQuiz(quiz,true);
  }catch(err){
    state.urlQuizDraft={...(state.urlQuizDraft||{}),error:friendlyError(err,false)};
    state.screen='urlquiz';
    renderUrlQuiz();
  } finally {
    _urlQuizInFlight=false;
  }
}

/* ====== BOOT ====== */
function dedupeByTopic(list){
  // Keep the most recently created entry for each section+topic+questionCount/charCount combo, drop the rest.
  const seen=new Map();
  const keep=[];
  // process newest-first so the most recent copy wins
  const sorted=[...list].sort((a,b)=>(b.createdAt||b.savedAt||0)-(a.createdAt||a.savedAt||0));
  for(const item of sorted){
    const key=`${item.section}|${(item.topic||item.name||'').trim().toLowerCase()}|${(item.subtopic||'').trim().toLowerCase()}`;
    if(seen.has(key)) continue;
    seen.set(key,true);
    keep.push(item);
  }
  // restore original relative order (newest first overall)
  return keep.sort((a,b)=>(b.createdAt||b.savedAt||0)-(a.createdAt||a.savedAt||0));
}

async function boot(){
  // Pull from cloud and merge before loading local state
  if(hasSyncConfig()){
    const snap=await cloudPull();
    if(snap) await mergeSnapshot(snap);
  }

  const idx=await safeGet('quizzes-index');
  let quizzes=Array.isArray(idx)?idx:[];
  const dedupedQuizzes=dedupeByTopic(quizzes);
  if(dedupedQuizzes.length!==quizzes.length){
    const removedIds=quizzes.filter(q=>!dedupedQuizzes.find(d=>d.id===q.id)).map(q=>q.id);
    for(const rid of removedIds){ await safeDelete(`quiz-${rid}`); }
    await safeSet('quizzes-index',dedupedQuizzes);
  }
  state.quizzesIndex=dedupedQuizzes;

  const libIdx=await safeGet('library-index');
  let lib=Array.isArray(libIdx)?libIdx:[];
  const dedupedLib=dedupeByTopic(lib);
  if(dedupedLib.length!==lib.length){
    const removedIds=lib.filter(l=>!dedupedLib.find(d=>d.id===l.id)).map(l=>l.id);
    for(const rid of removedIds){ await safeDelete(`lib-${rid}`); }
    await safeSet('library-index',dedupedLib);
  }
  state.libraryIndex=dedupedLib;

  renderDashboard();
}
boot();
</script>
