<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mission Control · AFCAT Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

:root{
  --ink:#0A0F1C;
  --panel:#131C2E;
  --panel-2:#1B2740;
  --line:rgba(231,236,245,0.10);
  --text:#E7ECF5;
  --text-dim:rgba(231,236,245,0.62);
  --green:#5EEAA0;
  --amber:#FFB454;
  --blue:#4C7DFF;
  --rose:#FF6F8E;
  --purple:#B07EFF;
  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at top, #0d1426 0%, var(--ink) 55%);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button,input,textarea,select{font-family:inherit;}
button{cursor:pointer;}
:focus-visible{outline:2px solid var(--green); outline-offset:2px;}
.app-shell{max-width:980px;margin:0 auto;padding:0 20px 64px;}

/* header */
.header{
  position:sticky; top:0; z-index:10;
  display:flex; align-items:center; gap:14px;
  padding:18px 0 16px; margin-bottom:8px;
  background:linear-gradient(180deg, var(--ink) 70%, rgba(10,15,28,0));
}
.header-back{
  background:none; border:1px solid var(--line); color:var(--text-dim);
  border-radius:8px; padding:8px 10px; font-size:13px; font-family:var(--mono);
  display:flex; align-items:center; gap:6px; transition:.15s;
}
.header-back:hover{border-color:var(--text-dim); color:var(--text);}
.header-id{display:flex; align-items:center; gap:10px;}
.header-glyph{width:26px;height:26px; flex:0 0 auto;}
.header-title{font-family:var(--mono); font-weight:600; letter-spacing:.04em; font-size:15px;}
.header-sub{font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:.08em; margin-top:1px;}

/* nav-tab-badge kept for FIXED SET badge */
.nav-tab-badge{
  display:inline-block; background:rgba(176,126,255,.18); color:var(--purple);
  font-family:var(--mono); font-size:10px; border-radius:4px; padding:1px 5px; margin-left:5px;
}

/* category bar */
.cat-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; align-items:center;}
.cat-pill{
  display:flex; align-items:center; gap:7px;
  background:var(--panel); border:1px solid var(--line); border-radius:30px;
  padding:7px 16px 7px 10px; font-family:var(--mono); font-size:12px; font-weight:600;
  letter-spacing:.06em; color:var(--text-dim); cursor:default; transition:.15s;
}
.cat-pill:hover{border-color:rgba(231,236,245,.25); color:var(--text);}
.cat-dot{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
.cat-pill-count{
  background:rgba(231,236,245,.08); border-radius:10px;
  font-size:10px; padding:1px 7px; margin-left:4px; color:var(--text-dim);
}

/* section view tabs */
.section-view-tabs{display:flex; gap:6px; margin-bottom:24px;}
.section-view-tab{
  background:none; border:none; color:var(--text-dim); font-family:var(--mono);
  font-size:12px; letter-spacing:.07em; text-transform:uppercase; padding:8px 14px;
  border-radius:8px; transition:.15s;
}
.section-view-tab:hover{background:var(--panel); color:var(--text);}
.section-view-tab.active{background:var(--panel); color:var(--text); box-shadow:0 0 0 1px var(--line);}

/* library toggle tab */
.lib-toggle{
  margin-left:auto; background:transparent; border:1px solid var(--line);
  color:var(--text-dim); border-radius:8px; padding:7px 14px;
  font-family:var(--mono); font-size:11px; letter-spacing:.05em; transition:.15s;
}
.lib-toggle:hover{border-color:var(--text-dim); color:var(--text);}

/* stat strip */
.stat-strip{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:28px;}
.stat{flex:1; min-width:120px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px;}
.stat-val{font-family:var(--mono); font-size:22px; font-weight:600;}
.stat-label{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:.09em; text-transform:uppercase; margin-top:4px;}

/* squadron */
.squadron{margin-bottom:30px;}
.squadron-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.squadron-code{font-family:var(--mono); font-size:11.5px; font-weight:700; letter-spacing:.1em; padding:4px 9px; border-radius:5px; color:var(--ink);}
.squadron-name{font-size:13.5px; color:var(--text-dim); letter-spacing:.02em;}
.tile-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px;}

/* quiz tiles */
.tile{
  background:var(--panel); border:1px solid var(--line); border-radius:12px;
  padding:16px; display:flex; flex-direction:column; gap:10px;
  border-left:3px solid var(--acc, var(--green)); transition:.15s;
}
.tile:hover{background:var(--panel-2);}
.tile-title{font-size:14.5px; font-weight:600; line-height:1.3;}
.tile-meta{font-family:var(--mono); font-size:11px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap;}
.tile-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.tile-actions{display:flex; gap:8px; margin-top:auto; flex-wrap:wrap;}
.mini-gauge{flex:0 0 auto;}

/* library tiles */
.lib-tile{
  background:var(--panel); border:1px solid var(--line); border-radius:12px;
  padding:16px; display:flex; flex-direction:column; gap:10px;
  border-left:3px solid var(--purple); transition:.15s;
}
.lib-tile:hover{background:var(--panel-2);}
.lib-tile-title{font-size:14.5px; font-weight:600; line-height:1.3;}
.lib-tile-meta{font-family:var(--mono); font-size:11px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap;}
.lib-tile-preview{
  font-size:12.5px; color:var(--text-dim); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  border-top:1px solid var(--line); padding-top:10px;
}
.lib-tile-actions{display:flex; gap:6px; margin-top:auto; flex-wrap:wrap;}

/* empty state */
.empty-state{border:1px dashed var(--line); border-radius:14px; padding:48px 24px; text-align:center; color:var(--text-dim);}
.empty-state h3{color:var(--text); font-size:17px; margin:0 0 8px;}
.empty-state p{font-size:13.5px; line-height:1.6; max-width:420px; margin:0 auto 18px;}

/* buttons */
.btn{
  border-radius:8px; border:1px solid transparent; padding:10px 18px;
  font-size:13.5px; font-weight:600; letter-spacing:.01em; transition:.15s;
  display:inline-flex; align-items:center; gap:8px;
}
.btn-primary{background:var(--green); color:#04130c;}
.btn-primary:hover{filter:brightness(1.08); transform:translateY(-1px);}
.btn-primary:disabled{opacity:.5; cursor:not-allowed; transform:none;}
.btn-purple{background:var(--purple); color:#0d0820;}
.btn-purple:hover{filter:brightness(1.08); transform:translateY(-1px);}
.btn-ghost{background:transparent; border-color:var(--line); color:var(--text);}
.btn-ghost:hover{border-color:var(--text-dim);}
.btn-amber{background:transparent; border-color:rgba(255,180,84,.4); color:var(--amber);}
.btn-amber:hover{background:rgba(255,180,84,.1);}
.btn-blue{background:transparent; border-color:rgba(76,125,255,.4); color:var(--blue);}
.btn-blue:hover{background:rgba(76,125,255,.1);}
.btn-danger{background:transparent; border-color:rgba(255,111,142,.4); color:var(--rose);}
.btn-danger:hover{background:rgba(255,111,142,.12);}
.btn-sm{padding:7px 12px; font-size:12px;}
.btn-full{width:100%; justify-content:center;}
.fab-row{display:flex; justify-content:flex-end; gap:10px; margin-bottom:22px; flex-wrap:wrap;}

/* panels & fields */
.panel-block{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:24px;}
.panel-block+.panel-block{margin-top:16px;}
.field{margin-bottom:20px;}
.field:last-child{margin-bottom:0;}
.field-label{font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); margin-bottom:9px; display:block;}
.chip-row{display:flex; gap:8px; flex-wrap:wrap;}
.chip{
  border:1px solid var(--line); background:transparent; color:var(--text-dim);
  border-radius:20px; padding:8px 16px; font-size:13px; font-weight:600;
  font-family:var(--mono); letter-spacing:.03em; transition:.15s;
}
.chip.active{background:var(--acc); color:var(--ink); border-color:var(--acc);}
.chip:not(.active):hover{border-color:var(--text-dim); color:var(--text);}
.input,.textarea{
  width:100%; background:var(--ink); border:1px solid var(--line); border-radius:9px;
  color:var(--text); padding:12px 14px; font-size:14px; line-height:1.5;
}
.input:focus,.textarea:focus{border-color:var(--green); outline:none;}
.textarea{resize:vertical; min-height:160px; font-family:var(--sans);}
.field-hint{font-size:11.5px; color:var(--text-dim); margin-top:7px;}
.count-row{display:flex; align-items:center; gap:14px;}
.count-stepper{display:flex; align-items:center; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
.count-stepper button{background:var(--panel-2); border:none; color:var(--text); width:34px; height:36px; font-size:16px;}
.count-stepper button:hover{background:var(--line);}
.count-val{font-family:var(--mono); font-size:16px; font-weight:600; width:46px; text-align:center;}
.char-count{font-family:var(--mono); font-size:11px; color:var(--text-dim); text-align:right; margin-top:5px;}
.char-count.warn{color:var(--amber);}
.char-count.ok{color:var(--green);}

/* banners */
.error-banner{background:rgba(255,111,142,.1); border:1px solid rgba(255,111,142,.35); color:var(--rose); border-radius:9px; padding:12px 14px; font-size:13px; margin-bottom:18px; font-family:var(--mono);}
.success-banner{background:rgba(94,234,160,.08); border:1px solid rgba(94,234,160,.3); color:var(--green); border-radius:9px; padding:12px 14px; font-size:13px; margin-bottom:18px; font-family:var(--mono);}

/* divider */
.section-divider{
  font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--text-dim); display:flex; align-items:center; gap:10px; margin:22px 0 16px;
}
.section-divider::before,.section-divider::after{content:''; flex:1; height:1px; background:var(--line);}

/* library select list */
.lib-select-list{display:flex; flex-direction:column; gap:8px; max-height:300px; overflow-y:auto; padding-right:2px;}
.lib-select-item{
  background:var(--ink); border:1px solid var(--line); border-radius:9px;
  padding:12px 14px; cursor:pointer; transition:.12s; display:flex; gap:12px; align-items:flex-start;
}
.lib-select-item:hover{border-color:var(--purple);}
.lib-select-item.selected{border-color:var(--purple); background:rgba(176,126,255,.07);}
.lib-select-item-dot{width:16px; height:16px; border-radius:50%; border:2px solid var(--line); flex:0 0 auto; margin-top:2px; transition:.12s;}
.lib-select-item.selected .lib-select-item-dot{background:var(--purple); border-color:var(--purple);}
.lib-select-item-body{flex:1; min-width:0;}
.lib-select-item-name{font-size:14px; font-weight:600; line-height:1.3;}
.lib-select-item-meta{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:3px;}
.lib-select-item-preview{font-size:12px; color:var(--text-dim); margin-top:5px; line-height:1.45; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

/* scanning */
.scan-wrap{text-align:center; padding:80px 20px;}
.scan-bar{height:3px; width:240px; margin:26px auto 0; background:var(--line); border-radius:2px; overflow:hidden; position:relative;}
.scan-bar::after{content:''; position:absolute; top:0; left:0; height:100%; width:40%; background:linear-gradient(90deg, transparent, var(--green), transparent); animation:scan 1.3s ease-in-out infinite;}
@keyframes scan{0%{left:-40%;}100%{left:100%;}}
.scan-title{font-family:var(--mono); font-size:13px; letter-spacing:.1em; color:var(--text-dim); text-transform:uppercase;}
.scan-sub{font-size:16px; margin-top:8px;}

/* play */
.play-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px;}
.play-info{font-family:var(--mono); font-size:12px; color:var(--text-dim); letter-spacing:.04em;}
.play-counter{font-family:var(--mono); font-size:12px; color:var(--text-dim);}
.progress-tape{display:flex; gap:4px; margin-bottom:26px;}
.tape-seg{flex:1; height:6px; border-radius:3px; background:var(--line);}
.tape-seg.correct{background:var(--green);}
.tape-seg.wrong{background:var(--rose);}
.tape-seg.current{outline:2px solid var(--text); outline-offset:1px;}
.question-card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:28px; margin-bottom:18px;}
.question-text{font-size:18px; line-height:1.5; font-weight:600; margin-bottom:22px;}
.option-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
@media(max-width:600px){.option-grid{grid-template-columns:1fr;}}
.option-btn{text-align:left; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:13px 15px; font-size:14px; color:var(--text); display:flex; gap:10px; align-items:flex-start; transition:.12s;}
.option-btn:hover:not(:disabled){border-color:var(--text-dim); transform:translateY(-1px);}
.option-btn:disabled{cursor:default;}
.option-letter{font-family:var(--mono); font-size:11px; font-weight:700; color:var(--text-dim); border:1px solid var(--line); border-radius:5px; width:20px; height:20px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; margin-top:1px;}
.option-btn.is-correct{border-color:var(--green); background:rgba(94,234,160,.1);}
.option-btn.is-correct .option-letter{border-color:var(--green); color:var(--green);}
.option-btn.is-wrong{border-color:var(--rose); background:rgba(255,111,142,.1);}
.option-btn.is-wrong .option-letter{border-color:var(--rose); color:var(--rose);}
.explain-box{margin-top:18px; border-radius:14px; overflow:hidden; border:1px solid var(--line);}
.explain-box b{color:var(--text); font-weight:600;}

/* wrong answer breakdown */
.explain-wrong-block{background:rgba(255,111,142,.07); border-bottom:1px solid var(--line); padding:14px 18px;}
.explain-correct-block{background:rgba(94,234,160,.06); padding:14px 18px;}
.explain-block-label{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; margin-bottom:7px; display:flex; align-items:center; gap:6px;}
.explain-block-label.wrong-label{color:var(--rose);}
.explain-block-label.correct-label{color:var(--green);}
.explain-block-label svg{flex:0 0 auto;}
.explain-answer-row{display:flex; align-items:flex-start; gap:10px; margin-bottom:6px;}
.explain-answer-letter{font-family:var(--mono); font-size:11px; font-weight:700; width:22px; height:22px; border-radius:6px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; margin-top:1px;}
.explain-answer-letter.wrong-letter{background:rgba(255,111,142,.18); color:var(--rose); border:1px solid rgba(255,111,142,.35);}
.explain-answer-letter.correct-letter{background:rgba(94,234,160,.15); color:var(--green); border:1px solid rgba(94,234,160,.3);}
.explain-answer-text{font-size:13.5px; font-weight:600; line-height:1.4; color:var(--text);}
.explain-reason{font-size:13px; line-height:1.6; color:var(--text-dim); margin-top:5px;}

/* correct-only explain (no wrong answer selected) */
.explain-correct{margin-top:12px; padding:12px 14px; border-radius:9px; background:rgba(94,234,160,.07); border:1px solid rgba(94,234,160,.2); font-size:13px; line-height:1.6; color:var(--text-dim);}
.explain-correct .explain-label{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--green); margin-bottom:5px; display:block;}
.explain-wrong-old{margin-top:10px; padding:12px 14px; border-radius:9px; background:rgba(255,111,142,.06); border:1px solid rgba(255,111,142,.18); font-size:13px; line-height:1.6; color:var(--text-dim);}
.explain-opt{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:4px;}
.play-foot{display:flex; justify-content:flex-end;}

/* debrief */
.debrief-head{display:flex; gap:28px; align-items:center; flex-wrap:wrap; margin-bottom:30px;}
.debrief-stats{display:flex; gap:22px; flex-wrap:wrap;}
.debrief-stat-val{font-family:var(--mono); font-size:26px; font-weight:700;}
.debrief-stat-label{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; margin-top:3px;}
.review-item{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:10px;}
.review-top{display:flex; gap:10px; align-items:flex-start; margin-bottom:8px;}
.review-icon{flex:0 0 auto; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; margin-top:2px;}
.review-icon.ok{background:rgba(94,234,160,.15); color:var(--green);}
.review-icon.bad{background:rgba(255,111,142,.15); color:var(--rose);}
.review-q{font-size:14px; font-weight:600; line-height:1.45;}
.review-ans{font-size:13px; color:var(--text-dim); margin-left:30px; line-height:1.6;}
.review-ans b{color:var(--text); font-weight:600;}
.review-explain{margin-left:30px; margin-top:6px; font-size:12.5px; color:var(--text-dim); font-style:italic;}
.debrief-actions{display:flex; gap:10px; margin-top:24px; flex-wrap:wrap;}

/* confirm dialog overlay */
.confirm-overlay{position:fixed;inset:0;background:rgba(10,15,28,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;max-width:380px;width:100%;text-align:center;}
.confirm-box h3{margin:0 0 10px;font-size:16px;}
.confirm-box p{margin:0 0 22px;font-size:13.5px;color:var(--text-dim);line-height:1.55;}
.confirm-box-actions{display:flex;gap:10px;justify-content:center;}

/* edit screen */
.screen-title{font-family:var(--mono);font-weight:700;letter-spacing:.04em;font-size:15px;margin:0 0 22px;}
.edit-opt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.edit-opt-row input[type="radio"]{flex:0 0 auto;width:16px;height:16px;accent-color:var(--green);}
.edit-opt-row .input{flex:1;}



/* tile score badge */
.tile-score{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;}
.tile-score.good{background:rgba(94,234,160,.15);color:var(--green);}
.tile-score.mid{background:rgba(255,180,84,.15);color:var(--amber);}
.tile-score.low{background:rgba(255,111,142,.15);color:var(--rose);}

/* debrief filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:16px;}
.filter-tab{background:none;border:1px solid var(--line);color:var(--text-dim);border-radius:20px;padding:6px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;transition:.15s;}
.filter-tab.active{background:var(--panel-2);color:var(--text);border-color:var(--text-dim);}
.filter-tab:hover:not(.active){border-color:var(--text-dim);}

/* question number jump */
.tape-seg{cursor:pointer;}
.tape-seg:hover{opacity:.75;}

/* ===== HackerRank-inspired design upgrades ===== */

/* Glassmorphism header */
.header{
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  background:linear-gradient(180deg,rgba(10,15,28,.92) 0%,rgba(10,15,28,0) 100%) !important;
  border-bottom:1px solid rgba(231,236,245,.06);
}

/* Hero headline on dashboard when quizzes exist */
.dashboard-hero{
  padding:36px 0 28px;
  border-bottom:1px solid var(--line);
  margin-bottom:28px;
}
.dashboard-hero-title{
  font-family:var(--mono);
  font-size:clamp(22px,4vw,34px);
  font-weight:700;
  letter-spacing:-.01em;
  line-height:1.15;
  margin:0 0 8px;
}
.dashboard-hero-title span{color:var(--green);}
.dashboard-hero-sub{
  font-size:14px;
  color:var(--text-dim);
  line-height:1.6;
  max-width:540px;
}

/* Pill stat strip */
.stat-strip{gap:12px;}
.stat{
  border-radius:14px;
  padding:18px 20px;
  position:relative;
  overflow:hidden;
}
.stat::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:2px;
  background:var(--stat-accent, var(--green));
  opacity:.55;
}
.stat-val{font-size:26px;}
.stat-label{margin-top:6px; font-size:10px; letter-spacing:.1em;}

/* Better tile cards */
.tile{
  border-radius:14px;
  padding:18px;
  position:relative;
  overflow:hidden;
  transition:.18s ease;
}
.tile::after{

<body>
<div id="app" class="app-shell"></div>
<div id="confirm-overlay" style="display:none;"></div>

<script>
/* ====== CONSTANTS ====== */
const SECTIONS = [
  {key:'english',           label:'English',            code:'ENG', acc:'var(--green)'},
  {key:'aptitude',          label:'Numerical Aptitude', code:'APT', acc:'var(--amber)'},
  {key:'reasoning',         label:'Reasoning',          code:'RSN', acc:'var(--blue)'},
  {key:'general-awareness', label:'General Awareness',  code:'GA',  acc:'var(--rose)'}
];
const sectionInfo = k => SECTIONS.find(s=>s.key===k) || SECTIONS[0];

/* ====== UTILITIES ====== */
function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function timeAgo(ts){
  if(!ts) return 'never';
  const d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
/* ====== CLOUD SYNC via GitHub Gist ====== */
// A secret Gist on the user's own free GitHub account holds the JSON snapshot.
// Gists never expire and the API rate limit (5,000 req/hr) resets every hour —
// unlike JSONBin's free tier, which is a one-time pool of requests that runs out.
const GIST_API='https://api.github.com/gists';
const GIST_FILENAME='afcat-sync.json';
let _syncGistId=localStorage.getItem('afcat_gist_id')||'';
let _syncToken=localStorage.getItem('afcat_gist_token')||'';
let _cloudData=null; // cached snapshot

function hasSyncConfig(){ return !!(_syncGistId&&_syncToken); }
function ghHeaders(){ return {'Authorization':`token ${_syncToken}`,'Accept':'application/vnd.github+json'}; }

// Creates the secret gist on first-ever sync (when the user only has a token yet)
async function ensureGist(){
  if(_syncGistId) return _syncGistId;
  const r=await fetch(GIST_API,{
    method:'POST',
    headers:{...ghHeaders(),'Content-Type':'application/json'},
    body:JSON.stringify({description:'AFCAT Quiz App sync data — do not delete',public:false,files:{[GIST_FILENAME]:{content:'{}'}}})
  });
  if(!r.ok) throw new Error('Could not create gist — check the token has Gist read/write access.');
  const j=await r.json();
  _syncGistId=j.id;
  localStorage.setItem('afcat_gist_id',_syncGistId);
  return _syncGistId;
}

async function cloudPull(){
  if(!hasSyncConfig()) return null;
  try{
    const r=await fetch(`${GIST_API}/${_syncGistId}`,{headers:ghHeaders()});
    if(!r.ok) return null;
    const j=await r.json();
    const file=j.files&&j.files[GIST_FILENAME];
    if(!file) return null;
    let content=file.content;
    if(file.truncated){ const rr=await fetch(file.raw_url); content=await rr.text(); }
    return JSON.parse(content);
  }catch(e){ return null; }
}

async function cloudPush(snapshot){
  if(!hasSyncConfig()) return;
  try{
    await fetch(`${GIST_API}/${_syncGistId}`,{
      method:'PATCH',
      headers:{...ghHeaders(),'Content-Type':'application/json'},
      body:JSON.stringify({files:{[GIST_FILENAME]:{content:JSON.stringify(snapshot)}}})
    });
  }catch(e){ /* silent — local copy is source of truth */ }
}

// Build full snapshot from localStorage
async function buildSnapshot(){
  const idx=localGet('quizzes-index')||[];
  const libIdx=localGet('library-index')||[];
  const quizzes={};
  for(const q of idx){ const d=localGet(`quiz-${q.id}`); if(d) quizzes[q.id]=d; }
  const libs={};
  for(const l of libIdx){ const d=localGet(`lib-${l.id}`); if(d) libs[l.id]=d; }
  return {v:2,quizzesIndex:idx,libraryIndex:libIdx,quizzes,libs,savedAt:Date.now()};
}

// Merge cloud snapshot into localStorage (cloud wins for new items; local wins for score stats)
async function mergeSnapshot(snap){
  if(!snap||snap.v!==2) return;
  const localIdx=localGet('quizzes-index')||[];
  const localIds=new Set(localIdx.map(q=>q.id));
  let changed=false;
  // merge quizzes
  const mergedIdx=[...localIdx];
  for(const [id,quiz] of Object.entries(snap.quizzes||{})){
    if(!localIds.has(id)){
      localSet(`quiz-${id}`,quiz);
      mergedIdx.push({id,section:quiz.section,topic:quiz.topic,questionCount:(quiz.questions||[]).length,createdAt:quiz.createdAt,attempts:quiz.stats?.attempts||0,bestScore:quiz.stats?.bestScore||0,lastAt:quiz.stats?.lastAt||null,source:quiz.source||'ai'});
      changed=true;
    } else {
      // merge stats — take the better score
      const local=localGet(`quiz-${id}`);
      if(local&&quiz.stats&&(quiz.stats.bestScore||0)>(local.stats?.bestScore||0)){
        localSet(`quiz-${id}`,{...local,stats:{...local.stats,...quiz.stats}});
        const entry=mergedIdx.find(q=>q.id===id);
        if(entry){ entry.bestScore=quiz.stats.bestScore; entry.attempts=Math.max(entry.attempts||0,quiz.stats.attempts||0); }
        changed=true;
      }
    }
  }
  if(changed) localSet('quizzes-index',mergedIdx);
  // merge library
  const localLibIdx=localGet('library-index')||[];
  const localLibIds=new Set(localLibIdx.map(l=>l.id));
  const mergedLibIdx=[...localLibIdx];
  for(const [id,lib] of Object.entries(snap.libs||{})){
    if(!localLibIds.has(id)){
      localSet(`lib-${id}`,lib);
      mergedLibIdx.push({id,section:lib.section,name:lib.name,subtopic:lib.subtopic,savedAt:lib.savedAt});
      changed=true;
    }
  }
  if(changed) localSet('library-index',mergedLibIdx);
}

/* ====== LOCAL STORAGE (raw helpers) ====== */
function localGet(key){ try{ const r=localStorage.getItem('afcat_'+key); return r===null?null:JSON.parse(r); }catch(e){ return null; } }
function localSet(key,v){ try{ localStorage.setItem('afcat_'+key,JSON.stringify(v)); }catch(e){} }
function localDel(key){ try{ localStorage.removeItem('afcat_'+key); }catch(e){} }

/* ====== safeGet / safeSet / safeDelete (used everywhere) ====== */
async function safeGet(key){ return localGet(key); }
async function safeSet(key,value){
  localSet(key,value);
  // push full snapshot to cloud (debounced)
  schedulePush();
  return true;
}
async function safeDelete(key){
  localDel(key);
  schedulePush();
}
let _pushTimer=null;
function schedulePush(){ clearTimeout(_pushTimer); _pushTimer=setTimeout(async()=>{ cloudPush(await buildSnapshot()); },1500); }

/* ====== SYNC SETUP UI ====== */
function showSyncSetup(){
  const overlay=document.getElementById('confirm-overlay');
  overlay.style.display='flex';
  overlay.innerHTML=`<div class="confirm-box" style="max-width:440px;">
    <h3>☁ Sync across devices</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px;">
      Uses a free, private <b>GitHub Gist</b> — permanent, no expiry. One-time setup:
      go to <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" style="color:var(--green)">github.com/settings/personal-access-tokens/new</a>,
      create a <b>fine-grained token</b> with <b>Gist: Read and write</b> permission (under Account permissions),
      and paste it below. Leave Gist ID blank the first time — it'll be created automatically.
      On other devices, use the same token <i>and</i> the Gist ID shown after your first save.
    </p>
    <label style="display:block;margin-bottom:8px;font-size:12px;color:var(--text-dim);">PERSONAL ACCESS TOKEN</label>
    <input id="sync-token" class="input" placeholder="github_pat_..." value="${_syncToken}" style="margin-bottom:10px;" type="password">
    <label style="display:block;margin-bottom:8px;font-size:12px;color:var(--text-dim);">GIST ID <span style="opacity:.6;">(blank = create new)</span></label>
    <input id="sync-gist-id" class="input" placeholder="e.g. 3f1a9b2c... (leave blank first time)" value="${_syncGistId}" style="margin-bottom:16px;">
    <div class="confirm-box-actions">
      <button class="btn btn-ghost" onclick="hideConfirm()">Cancel</button>
      ${hasSyncConfig()?`<button class="btn btn-danger" onclick="clearSync()">Disconnect</button>`:''}
      <button class="btn btn-primary" onclick="saveSync()">Save &amp; Sync</button>
    </div>
  </div>`;
}

function clearSync(){
  _syncGistId=''; _syncToken='';
  localStorage.removeItem('afcat_gist_id');
  localStorage.removeItem('afcat_gist_token');
  hideConfirm();
  renderDashboard();
}

async function saveSync(){
  const token=document.getElementById('sync-token').value.trim();
  const gistId=document.getElementById('sync-gist-id').value.trim();
  if(!token){ alert('Paste your GitHub personal access token first.'); return; }
  _syncToken=token; _syncGistId=gistId;
  localStorage.setItem('afcat_gist_token',token);
  if(gistId) localStorage.setItem('afcat_gist_id',gistId);
  hideConfirm();
  try{
    await ensureGist(); // creates the gist if _syncGistId was blank
  }catch(e){
    alert(e.message||'Sync setup failed — check your token.');
    return;
  }
  // Pull from cloud immediately and merge
  const snap=await cloudPull();
  if(snap) await mergeSnapshot(snap);
  // Push local data up
  await cloudPush(await buildSnapshot());
  await boot();
  alert(`✓ Synced! Gist ID: ${_syncGistId}\n\nUse this same Gist ID + your token on your other device.`);
}


/* ====== API CALL WRAPPER (CORS-safe for GitHub Pages) ====== */
/* ====== GROQ API (FREE) ====== */
let _apiKey=localStorage.getItem('afcat_groq_key')||'';
function setApiKey(k){ _apiKey=k; if(k) localStorage.setItem('afcat_groq_key',k); else localStorage.removeItem('afcat_groq_key'); }

function showApiKeySetup(){
  const overlay=document.getElementById('confirm-overlay');

    <h3>🔑 Groq API Key (Free)</h3>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:4px;">
      Get a <b>free</b> key at
      <a href="https://console.groq.com/keys" target="_blank" style="color:var(--green)">console.groq.com/keys</a>
      — sign in with Google, click <b>Create API Key</b>, copy and paste below.
      Completely free, no credit card needed.
    </p>
    <p style="font-size:12px;color:var(--amber);margin-bottom:14px;">⚠ Stored only in your browser.</p>
    <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);">GROQ API KEY</label>
    <input id="api-key-input" class="input" placeholder="gsk_..." value="${_apiKey}" type="password" style="margin-bottom:16px;font-family:var(--mono);">
    <div class="confirm-box-actions">
      <button class="btn btn-ghost" onclick="hideConfirm()">Cancel</button>
      ${_apiKey?`<button class="btn btn-danger" onclick="setApiKey('');hideConfirm();renderDashboard();">Remove</button>`:''}
      <button class="btn btn-primary" onclick="saveApiKey()">Save</button>
    </div>
  </div>`;
}

function saveApiKey(){
  const k=document.getElementById('api-key-input').value.trim();
  if(!k){ alert('Please paste your Groq API key.'); return; }
  setApiKey(k); hideConfirm(); renderDashboard();
}

async function callClaude({system, messages, max_tokens}){
  if(!_apiKey){ showApiKeySetup(); throw new Error('API key required — enter your free Groq API key first.'); }
  const url='https://api.groq.com/openai/v1/chat/completions';
  const userText=messages.map(m=>typeof m.content==='string'?m.content:(m.content||[]).map(c=>c.text||'').join('')).join('\n');
  const body={
    model:'llama-3.3-70b-versatile',
    messages:[
      {role:'system',content:system||''},
      {role:'user',content:userText}
    ],
    max_tokens:max_tokens||2500,
    temperature:0.7
  };
  const resp=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+_apiKey},
    body:JSON.stringify(body)
  });
  if(!resp.ok){
    const txt=await resp.text().catch(()=>'');
    if(resp.status===401){ showApiKeySetup(); throw new Error('Invalid Groq API key — please check and re-enter it.'); }
    throw new Error(`API error ${resp.status}${txt?' — '+txt.slice(0,120):''}`);
  }
  const json=await resp.json();
  const text=json.choices?.[0]?.message?.content||'';
  return {content:[{type:'text',text}]};
}


const state = {
  screen: 'dashboard',
  quizzesIndex: [],
  libraryIndex: [],
  draft: null,
  play: null,
  debrief: null,
  libDraft: null,
  editLibId: null,    // id of entry being edited
  importDraft: null,  // {section, topic, raw, error, fileName} for the imported question-set flow
  quizEditDraft: null, // {id, section, topic, source, questions, error} for editing an imported quiz
};
// Module-level mutable UI vars (so re-renders can read them)
let _createSection = 'english';
let _createCount   = 10;
let _libSection    = 'english';
let _importSection = 'english';
let _pinnedLibId   = null;  // stays fixed until user taps a different library entry

/* ====== GAUGE ====== */
function gaugeSVG(percent, mini){
  percent=Math.max(0,Math.min(100,Math.round(percent)));
  const size=mini?64:188, cx=size/2, cy=size*0.56, r=size*0.37, strokeW=mini?5:11;
  const pt=(deg,rad)=>{const a=deg*Math.PI/180;return[cx+rad*Math.cos(a),cy-rad*Math.sin(a)];};
  const [x0,y0]=pt(180,r), [x1,y1]=pt(0,r);
  const bg=`M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1}`;
  const va=180-(percent/100*180), [vx,vy]=pt(va,r), la=percent>50?1:0;
  const fg=percent>0?`M ${x0} ${y0} A ${r} ${r} 0 ${la} 1 ${vx} ${vy}`:'';
  const col=percent>=75?'var(--green)':percent>=45?'var(--amber)':'var(--rose)';
  let ticks='',needle='',label='';
  if(!mini){
    for(let v=0;v<=100;v+=25){const a=180-(v/100*180);const [t1x,t1y]=pt(a,r+5);const[t2x,t2y]=pt(a,r-7);ticks+=`<line x1="${t1x}" y1="${t1y}" x2="${t2x}" y2="${t2y}" stroke="rgba(231,236,245,0.35)" stroke-width="2"/>`;}
    const[nx,ny]=pt(va,r-16);
    needle=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="5" fill="var(--text)"/>`;
    label=`<text x="${cx}" y="${cy+34}" text-anchor="middle" font-family="var(--mono)" font-size="22" font-weight="700" fill="var(--text)">${percent}%</text>`;
  }
  return `<svg viewBox="0 0 ${size} ${size*0.68}" width="${size}" height="${size*0.68}">
    <path d="${bg}" fill="none" stroke="rgba(231,236,245,0.12)" stroke-width="${strokeW}" stroke-linecap="round"/>
    ${fg?`<path d="${fg}" fill="none" stroke="${col}" stroke-width="${strokeW}" stroke-linecap="round"/>`:''}
    ${ticks}${needle}${label}
  </svg>`;
}

/* ====== HEADER ====== */

          ? `<span style="color:var(--green);font-size:10px;">●</span> KEY SET`

/* ====== BACKUP / RESTORE ====== */
async function exportData(){
  const idx=await safeGet('quizzes-index')||[];
  const libIdx=await safeGet('library-index')||[];
  const quizzes=[];
  for(const q of idx){
    const full=await safeGet(`quiz-${q.id}`);
    if(full) quizzes.push(full);
  }
  const libs=[];
  for(const l of libIdx){
    const full=await safeGet(`lib-${l.id}`);
    if(full) libs.push(full);
  }
  const blob=new Blob([JSON.stringify({version:1,exportedAt:Date.now(),quizzes,libs},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`afcat-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function importData(evt){
  const file=evt.target.files[0];
  evt.target.value='';
  if(!file) return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.quizzes||!Array.isArray(data.quizzes)) throw new Error('Invalid backup file');
    let imported=0;
    const existingIdx=await safeGet('quizzes-index')||[];
    const existingIds=new Set(existingIdx.map(q=>q.id));
    for(const quiz of data.quizzes){
      if(!quiz.id||existingIds.has(quiz.id)) continue;
      await safeSet(`quiz-${quiz.id}`,quiz);
      existingIdx.push({id:quiz.id,section:quiz.section,topic:quiz.topic,questionCount:(quiz.questions||[]).length,createdAt:quiz.createdAt,attempts:quiz.stats?.attempts||0,bestScore:quiz.stats?.bestScore||0,lastAt:quiz.stats?.lastAt||null,source:quiz.source||'ai'});
      imported++;
    }
    await safeSet('quizzes-index',existingIdx);
    if(data.libs&&Array.isArray(data.libs)){
      const existingLibIdx=await safeGet('library-index')||[];
      const existingLibIds=new Set(existingLibIdx.map(l=>l.id));
      for(const lib of data.libs){
        if(!lib.id||existingLibIds.has(lib.id)) continue;
        await safeSet(`lib-${lib.id}`,lib);
        existingLibIdx.push({id:lib.id,section:lib.section,name:lib.name,subtopic:lib.subtopic,savedAt:lib.savedAt});
      }
      await safeSet('library-index',existingLibIdx);
    }
    alert(`✓ Imported ${imported} new quiz${imported===1?'':'zes'} successfully.`);
    await boot();
  }catch(e){
    alert('Import failed: '+(e.message||'Invalid file'));
  }
}

function navTabsHtml(active){
  // Build category pills showing quiz counts per section
  const idx = state.quizzesIndex;
  const lib = state.libraryIndex;

  const pills = SECTIONS.map(sec => {
    const quizCount = idx.filter(q => q.section === sec.key).length;
    if(!quizCount) return '';
    return `<div class="cat-pill">
      <span class="cat-dot" style="background:${sec.acc}"></span>
      <span style="color:${sec.acc}">${sec.code}</span>
      <span style="color:var(--text-dim);font-weight:400;letter-spacing:.02em;">${sec.label}</span>
      <span class="cat-pill-count">${quizCount}</span>
    </div>`;
  }).join('');

  const noQuizzes = idx.length === 0;

  if(active === 'library'){
    // On library screen show a simple back-to-quizzes tab
    return `<div class="cat-bar">
      <button class="section-view-tab active">📚 Content Library <span class="cat-pill-count" style="margin-left:4px;">${lib.length}</span></button>
      <button class="lib-toggle" onclick="goDashboard()">← Quizzes</button>
    </div>`;
  }

  if(noQuizzes){
    return `<div class="cat-bar" style="margin-bottom:20px;"></div>`;
  }

  return `<div class="cat-bar">
    ${pills}
    <button class="lib-toggle" onclick="goLibrary()">📚 Library <span class="cat-pill-count">${lib.length}</span></button>
  </div>`;
}

/* ====== CONFIRM DIALOG ====== */
function showConfirm(title, body, confirmLabel, confirmClass, onConfirm){
  const overlay = document.getElementById('confirm-overlay');
  overlay.style.display='flex';
  overlay.innerHTML=`<div class="confirm-box">
    <h3>${escapeHtml(title)}</h3>
    <p>${escapeHtml(body)}</p>
    <div class="confirm-box-actions">
      <button class="btn btn-ghost" onclick="hideConfirm()">Cancel</button>
      <button class="btn ${confirmClass}" id="confirm-btn">${escapeHtml(confirmLabel)}</button>
    </div>
  </div>`;
  document.getElementById('confirm-btn').onclick = ()=>{ hideConfirm(); onConfirm(); };
}
function hideConfirm(){ document.getElementById('confirm-overlay').style.display='none'; }

/* ====== DASHBOARD ====== */
function goDashboard(){ state.screen='dashboard'; renderDashboard(); }

function renderDashboard(){
  state.screen='dashboard';
  const idx=state.quizzesIndex;
  const totalAttempts=idx.reduce((s,q)=>s+(q.attempts||0),0);
  const scored=idx.filter(q=>q.attempts>0);
  const avgAcc=scored.length?Math.round(scored.reduce((s,q)=>s+q.bestScore,0)/scored.length):0;

  let body='';
  if(idx.length===0){
    body=`<div class="dashboard-hero" style="text-align:center;border:none;margin-bottom:32px;">
      <div class="dashboard-hero-title">Ready to <span>fly?</span></div>
      <div class="dashboard-hero-sub" style="margin:0 auto 24px;">Add study material, generate AI-powered quizzes, or import your own question set.</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-purple" onclick="goLibrary()">Open Content Library</button>
        <button class="btn btn-primary" onclick="goCreate()">+ Quick quiz</button>
        <button class="btn btn-blue" onclick="goImport()">Import Q&amp;A set</button>
      </div>
    </div>`;
  } else {
    const accentColor=avgAcc>=75?'var(--green)':avgAcc>=45?'var(--amber)':'var(--rose)';
    body=`<div class="dashboard-hero">
      <div class="dashboard-hero-title">Mission <span>Control</span></div>
      <div class="dashboard-hero-sub">Track your AFCAT preparation across ${idx.length} topic${idx.length===1?'':'s'}. Keep flying until every score hits green.</div>
    </div>
    <div class="stat-strip">
      <div class="stat" style="--stat-accent:var(--green)"><div class="stat-val">${idx.length}</div><div class="stat-label">Topics briefed</div></div>
      <div class="stat" style="--stat-accent:var(--blue)"><div class="stat-val">${totalAttempts}</div><div class="stat-label">Total attempts</div></div>
      ${scored.length?`<div class="stat" style="--stat-accent:${accentColor}"><div class="stat-val" style="color:${accentColor}">${avgAcc}%</div><div class="stat-label">Avg best score</div></div>`:''}
    </div>`;
    SECTIONS.forEach(sec=>{
      const items=idx.filter(q=>q.section===sec.key);
      if(!items.length) return;
      body+=`<div class="squadron">
        <div class="squadron-head">
          <span class="squadron-code" style="background:${sec.acc}">${sec.code}</span>
          <span class="squadron-name">${sec.label}</span>
        </div>
        <div class="tile-grid">${items.map(q=>quizTileHtml(q,sec)).join('')}</div>
      </div>`;
    });
  }

  document.getElementById('app').innerHTML=`
    ${headerHtml(null)}
    ${navTabsHtml('quizzes')}
    <div class="fab-row">
      ${idx.length?`<button class="btn btn-blue" onclick="goImport()">Import Q&amp;A</button>`:''}
      <button class="btn btn-amber" onclick="goNewsQuiz()" title="Paste a news article → AI makes GA questions">📰 News → Quiz</button>
      <button class="btn btn-purple" onclick="goUrlQuiz()" title="Paste a YouTube transcript or webpage → AI extracts questions">🔗 URL/Video → Quiz</button>
      ${idx.length?`<button class="btn btn-primary" onclick="goCreate()">+ New briefing</button>`:''}
    </div>
    ${body}`;
}

function quizTileHtml(q,sec){
  const hasScore=q.attempts>0;
  const scoreVal=q.bestScore||0;
  const scoreCls=scoreVal>=75?'good':scoreVal>=45?'mid':'low';
  const scoreBadge=hasScore?`<span class="tile-score ${scoreCls}">${scoreVal}%</span>`:'';
  const attemptMeta=hasScore?`<span>${q.attempts} attempt${q.attempts>1?'s':''}</span><span>best ${scoreVal}%</span>`:'<span>Not attempted</span>';
  return `<div class="tile" style="--acc:${sec.acc}">
    <div class="tile-row">
      <div class="tile-title">${escapeHtml(q.topic)}</div>
      ${q.source==='import'?`<span class="nav-tab-badge" style="background:rgba(76,125,255,.18);color:var(--blue);white-space:nowrap;">FIXED SET</span>`:q.source==='news'?`<span class="nav-tab-badge" style="background:rgba(255,180,84,.18);color:var(--amber);white-space:nowrap;">📰 NEWS</span>`:q.source==='url'?`<span class="nav-tab-badge" style="background:rgba(176,126,255,.18);color:var(--purple);white-space:nowrap;">🔗 SOURCE</span>`:scoreBadge}
    </div>
    <div class="tile-meta">
      <span>${q.questionCount} Q</span>
      ${attemptMeta}
      ${q.lastAt?`<span>${timeAgo(q.lastAt)}</span>`:''}
    </div>
    <div class="tile-actions">
      <button class="btn btn-primary btn-sm" onclick="startQuiz('${q.id}')">Play</button>
      <button class="btn btn-amber btn-sm" onclick="goEditQuiz('${q.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteQuiz('${q.id}','${escapeHtml(q.topic).replace(/'/g,"\\'")}')">Delete</button>
    </div>
  </div>`;
}

function confirmDeleteQuiz(id, topic){
  showConfirm('Delete quiz?', `"${topic}" will be permanently removed.`, 'Delete', 'btn-danger', async ()=>{
    state.quizzesIndex=state.quizzesIndex.filter(q=>q.id!==id);
    await safeSet('quizzes-index',state.quizzesIndex);
    await safeDelete(`quiz-${id}`);
    renderDashboard();
  });
}

function pickLibSection(key){

let _addContentInFlight=false;
async function submitAddContent(andGenerate){
  if(_addContentInFlight) return; // guard: ignore double-clicks/double-fires while a save is already in progress
  const name=document.getElementById('lib-name-input').value.trim();
  const subtopic=document.getElementById('lib-subtopic-input').value.trim();
  const content=document.getElementById('lib-content-input').value.trim();
  const section=_libSection;
  if(!name){ state.libDraft={section,name,subtopic,content,error:'Give this topic a name first.',saved:false}; renderAddContent(); return; }
  if(content.length<80){ state.libDraft={section,name,subtopic,content,error:'Please paste at least a few sentences of study material.',saved:false}; renderAddContent(); return; }
  _addContentInFlight=true;
  document.querySelectorAll('.btn').forEach(b=>b.disabled=true);
  try{
    const trimmed=content.slice(0,40000);
    const id=uid();
    const displayName=subtopic?`${name} — ${subtopic}`:name;
    const entry={id,section,name,subtopic,preview:trimmed.slice(0,200).replace(/\s+/g,' '),charCount:trimmed.length,savedAt:Date.now()};
    await safeSet(`lib-${id}`,{id,section,name,subtopic,content:trimmed,savedAt:Date.now()});
    state.libraryIndex=[entry,...state.libraryIndex];
    await safeSet('library-index',state.libraryIndex);
    if(andGenerate){ goCreateFromLib(id); }
    else { state.libDraft={section:'english',name:'',subtopic:'',content:'',error:null,saved:true}; _libSection='english'; renderAddContent(); }
  } finally {
    _addContentInFlight=false;
  }
}

let _editContentInFlight=false;
async function submitEditContent(andGenerate){
  if(_editContentInFlight) return;
  const name=document.getElementById('lib-name-input').value.trim();
  const subtopic=document.getElementById('lib-subtopic-input').value.trim();
  const content=document.getElementById('lib-content-input').value.trim();
  const section=_libSection;
  if(!name){ state.libDraft={section,name,subtopic,content,error:'Give this topic a name first.',saved:false}; renderEditContent(); return; }
  if(content.length<80){ state.libDraft={section,name,subtopic,content,error:'Please paste at least a few sentences of study material.',saved:false}; renderEditContent(); return; }
  _editContentInFlight=true;
  document.querySelectorAll('.btn').forEach(b=>b.disabled=true);
  try{
    const trimmed=content.slice(0,40000);
    const id=state.editLibId;
    // Update full content
    await safeSet(`lib-${id}`,{id,section,name,subtopic,content:trimmed,savedAt:Date.now()});
    // Update index entry
    const idx=state.libraryIndex.findIndex(l=>l.id===id);
    if(idx>=0){
      state.libraryIndex[idx]={...state.libraryIndex[idx],section,name,subtopic,preview:trimmed.slice(0,200).replace(/\s+/g,' '),charCount:trimmed.length,savedAt:Date.now()};
    }
    await safeSet('library-index',state.libraryIndex);
    if(andGenerate){ goCreateFromLib(id); }
    else { state.editLibId=null; goLibrary(); }
  } finally {
    _editContentInFlight=false;
  }
}

let _pdfjsLoading=null;
function ensurePdfJs(){
  if(window.pdfjsLib) return Promise.resolve();
  if(_pdfjsLoading) return _pdfjsLoading;
  _pdfjsLoading=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{
      try{
        window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve();
      }catch(err){ reject(err); }
    };
    s.onerror=()=>reject(new Error('Could not load the PDF reader.'));
    document.head.appendChild(s);
  });
  return _pdfjsLoading;
}
async function extractPdfText(file){
  await ensurePdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(it=>it.str).join(' ')+'\n\n';
  }
  return text;
}

async function parseImport(draft){
  state.screen='importing';
  renderImporting(draft);
  try{
    const sec=sectionInfo(draft.section);
    const sys=`You are a precise exam-paper digitizer for the AFCAT (Indian Air Force Common Admission Test) ${sec.label} section.

You will receive raw text — pasted or extracted from a file — containing multiple-choice questions that a human has already written, along with their answers in some form. Your ONLY job is to extract and structure exactly what is there. Do NOT invent, rewrite, reword, or add any questions, options, or explanations that aren't already present in the source text.

Preserve the exact original wording of each question and each option (you may trim stray numbering, bullets, or whitespace, but never change the substance of the wording).

Answers may appear in any of these forms — handle all of them:
- A separate answer key, anywhere in the text, e.g. "1-b, 2-d, 3-a" or "1. B  2. D  3. A" or "Answers: b, d, a, c..."
- The correct option marked right after its question, e.g. "Ans: c", "Answer: Paris", "Correct option: B"
- The correct option marked inline within the original text itself (symbol, bold marker, "(correct)", etc.)
- Options labelled a/b/c/d, A/B/C/D, 1/2/3/4, i/ii/iii/iv, or left unlabelled (use the order given in that case)

Rules:
- If explanatory text for an answer is already present in the source, include it concisely as "explanation". If none is given, use an empty string — never fabricate one.
- If a question's correct answer truly cannot be determined from the text, drop that question entirely rather than guessing.
- Extract every question that does have a determinable answer — however many there are, don't cap or skip questions just because there are a lot.

Respond with ONLY a minified JSON array and nothing else — no markdown fences, no preamble, no commentary.
Schema: [{"q":"question text","options":["opt1","opt2","..."],"correct":0,"explanation":""}]`;

    const data=await callClaude({
        max_tokens:8000,
        system:sys,
        messages:[{role:'user',content:draft.raw}]
      });
    let jsonStr=(data.content||[]).map(b=>b.text||'').join('').trim();
    jsonStr=jsonStr.replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const start=jsonStr.indexOf('['), end=jsonStr.lastIndexOf(']');
    if(start>=0&&end>start) jsonStr=jsonStr.slice(start,end+1);
    let parsed;
    try{ parsed=JSON.parse(jsonStr); }
    catch(e){ throw new Error('Could not match all the questions to their answers. Check the format and try again.'); }
    const cleaned=(Array.isArray(parsed)?parsed:[]).filter(q=>
      q&&typeof q.q==='string'&&q.q.trim()&&
      Array.isArray(q.options)&&q.options.length>=2&&
      Number.isInteger(q.correct)&&q.correct>=0&&q.correct<q.options.length
    ).map(q=>({q:q.q.trim(),options:q.options.map(o=>String(o).trim()),correct:q.correct,explanation:typeof q.explanation==='string'?q.explanation.trim():''}));
    if(cleaned.length===0) throw new Error('No questions could be matched to answers. Make sure an answer key or marked answers are included in the text.');

    const id=uid();
    // Note: no "content" field is stored — this keeps the quiz fixed (the play loop only
    // regenerates fresh questions when quiz.content is present, which is the AI-from-notes path).
    const quiz={id,section:draft.section,topic:draft.topic,source:'import',createdAt:Date.now(),questions:cleaned,stats:{attempts:0,bestScore:0,lastScore:null,lastAt:null}};
    await safeSet(`quiz-${id}`,quiz);
    const idxEntry={id,section:draft.section,topic:draft.topic,questionCount:cleaned.length,createdAt:quiz.createdAt,attempts:0,bestScore:0,lastAt:null,source:'import'};
    state.quizzesIndex=[idxEntry,...state.quizzesIndex];
    await safeSet('quizzes-index',state.quizzesIndex);
    startQuiz(quiz,true);
  }catch(err){
    state.importDraft={...(state.importDraft||{}),error:(err&&err.message)?err.message:'Something went wrong reading the question set.'};
    state.screen='import';
    renderImport();
  } finally {
    _submitImportInFlight=false;
  }
}

async function saveEditQuiz(){
  const d=state.quizEditDraft;
  const topic=d.topic.trim();
  if(!topic){ d.error='Give this set a name first.'; renderEditQuiz(); return; }
  for(let i=0;i<d.questions.length;i++){

    const filledCount=q.options.filter(o=>o.trim()).length;

    return{q:q.q.trim(),options:newOptions,correct:newCorrect>=0?newCorrect:0,explanation:(q.explanation||'').trim()};

  }
  goDashboard();
}

function chunkContent(content, chunkSize=8000, overlap=500){
  if(content.length<=chunkSize) return [content];
  const chunks=[];
  let pos=0;
  while(pos<content.length){
    chunks.push(content.slice(pos,pos+chunkSize));
    pos+=chunkSize-overlap;
  }
  return chunks;
}

function parseQuestionJson(raw){
  let s=raw.trim();
  s=s.replace(/^```json\s*/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  const start=s.indexOf('['), end=s.lastIndexOf(']');
  if(start>=0&&end>start) s=s.slice(start,end+1);
  return JSON.parse(s);
}

function cleanQuestions(parsed){
  return (Array.isArray(parsed)?parsed:[]).filter(q=>
    q&&typeof q.q==='string'&&q.q.trim()&&
    Array.isArray(q.options)&&q.options.length>=2&&
    Number.isInteger(q.correct)&&q.correct>=0&&q.correct<q.options.length
  ).map(q=>({
    q:q.q.trim(),
    options:q.options.map(o=>String(o).trim()).filter(Boolean),
    correct:q.correct,
    explanation:typeof q.explanation==='string'?q.explanation.trim():'',
    wrongReason:typeof q.wrongReason==='string'?q.wrongReason.trim():''
  }));
}

function buildGenPrompt(sec, count, usedList){
  const usedBlock=usedList&&usedList.length
    ? `\nAlready tested (rephrase or test a different detail this time):\n${usedList.slice(-40).map(q=>'- '+q).join('\n')}\n`
    : '';
  return `You are a strict AFCAT (Air Force Common Admission Test) question setter for the ${sec.label} section.
${usedBlock}
STRICT RULES — follow ALL of them:
1. Every question and every option must come ONLY from the provided study material. Do NOT add facts, names, dates, or concepts that are absent from the material.
2. The correct answer must be directly traceable to a specific sentence or fact in the material.
3. Wrong (distractor) options must relate to the same topic — pick plausible but clearly incorrect alternatives from within the material (e.g. other items on the same list, nearby facts). Never use random unrelated items.
4. Preserve exact wording of names, abbreviations, and terms as they appear in the material.
5. For abbreviation/acronym content: only ask "What does X stand for?" or "Which abbreviation stands for Y?" — no invented context.
6. Each question must have EXACTLY 4 options and EXACTLY 1 correct answer.
7. Write a short explanation (≤20 words) citing the specific fact that makes the answer correct.
8. Write a short wrongReason (≤20 words) explaining the most common mistake a student might make on this question.
9. Generate exactly ${count} questions if the material supports it; fewer if not.

Respond with ONLY a minified JSON array — no markdown fences, no preamble.
Schema: [{"q":"question","options":["a","b","c","d"],"correct":0,"explanation":"why correct","wrongReason":"common error"}]`;
}

function friendlyError(err, isBatch){
  const m=(err&&err.message)||'';
  if(m.includes('401')||m.includes('Invalid')||m.includes('key'))
    return 'API key rejected. Use the KEY SET button to re-enter your Groq API key.';
  if(m.includes('429')||m.toLowerCase().includes('rate limit'))
    return 'Rate limit reached. Wait 30–60 seconds then try again, or reduce the question count.';
  if(m.includes('50')||m.includes('network')||m.includes('fetch'))
    return 'Network error. Check your internet connection and try again.';
  if(m.includes('JSON')||m.includes('parse')||m.includes('token'))
    return isBatch
      ? 'One batch returned an unexpected response. Questions from other batches were saved. Try regenerating.'
      : 'The AI response could not be read. Try reducing the question count to 5–6 or using a shorter excerpt.';
  if(m.includes('No usable')||m.includes('No questions'))
    return 'No questions could be generated. Make sure your material contains clear facts, definitions, or named items.';
  return m||'Something went wrong. Try again with a shorter excerpt or fewer questions.';
}

async function generateQuiz(draft){
  state.screen='generating';
  renderGenerating(draft);
  try{
    const sec=sectionInfo(draft.section);
    const chunks=chunkContent(draft.content,8000,600);
    const perChunk=Math.ceil(draft.count/chunks.length);
    let allCleaned=[];
    let batchError=null;

    for(let ci=0;ci<chunks.length;ci++){
      const msg=chunks.length>1?`batch ${ci+1} of ${chunks.length}…`:'picking the most important exam questions…';
      renderGenerating(draft,msg);
      try{
        const data=await callClaude({
          max_tokens:3500,
          system:buildGenPrompt(sec,perChunk,null),
          messages:[{role:'user',content:`Topic: ${draft.topic}\n\nStudy material (part ${ci+1}/${chunks.length}):\n${chunks[ci]}`}]
        });
        const raw=(data.content||[]).map(b=>b.text||'').join('');
        allCleaned.push(...cleanQuestions(parseQuestionJson(raw)));
      }catch(e){ batchError=e; }
    }

    // Deduplicate and trim
    const seen=new Set();
    allCleaned=allCleaned.filter(q=>{ if(seen.has(q.q)) return false; seen.add(q.q); return true; }).slice(0,draft.count);

    if(allCleaned.length===0) throw batchError||new Error('No usable questions came back from the AI.');

    const id=uid();
    const quiz={id,section:draft.section,topic:draft.topic,content:draft.content,count:draft.count,createdAt:Date.now(),questions:allCleaned,usedQuestions:allCleaned.map(q=>q.q),stats:{attempts:0,bestScore:0,lastScore:null,lastAt:null}};
    await safeSet(`quiz-${id}`,quiz);
    state.quizzesIndex=[{id,section:draft.section,topic:draft.topic,questionCount:allCleaned.length,createdAt:quiz.createdAt,attempts:0,bestScore:0,lastAt:null},...state.quizzesIndex];
    await safeSet('quizzes-index',state.quizzesIndex);

    if(batchError&&allCleaned.length>0){
      state.draft={...(state.draft||{}),error:`⚠ One batch had an issue but ${allCleaned.length} question${allCleaned.length>1?'s were':'was'} saved. ${friendlyError(batchError,true)}`};
    }
    startQuiz(quiz,true);
  }catch(err){
    state.draft={...(state.draft||{}),error:friendlyError(err,false)};
    state.screen='create';
    renderCreate();
  } finally {
    _submitCreateInFlight=false;
  }
}

/* ====== PLAY ====== */
async function startQuiz(quizOrId,skipRegen){
  let quiz=quizOrId;
  if(typeof quizOrId==='string'){
    quiz=await safeGet(`quiz-${quizOrId}`);
    if(!quiz){ goDashboard(); return; }
  }

  // If we have the original source material, regenerate a fresh set each time Play is pressed
  if(quiz.content && !skipRegen){
    state.screen='generating';
    renderGenerating({topic:quiz.topic,section:quiz.section});
    try{
      const sec=sectionInfo(quiz.section);
      const count=quiz.count||quiz.questions.length||10;
      const usedList=quiz.usedQuestions||quiz.questions.map(q=>q.q);
      const chunks=chunkContent(quiz.content,8000,600);
      const perChunk=Math.ceil(count/chunks.length);
      let allCleaned=[];

      for(let ci=0;ci<chunks.length;ci++){
        const msg=chunks.length>1?`refreshing — batch ${ci+1} of ${chunks.length}…`:'generating a fresh question set…';
        renderGenerating({topic:quiz.topic,section:quiz.section},msg);
        try{
          const data=await callClaude({
            max_tokens:3500,
            system:buildGenPrompt(sec,perChunk,usedList),
            messages:[{role:'user',content:`Topic: ${quiz.topic}\n\nStudy material (part ${ci+1}/${chunks.length}):\n${chunks[ci]}`}]
          });
          const raw=(data.content||[]).map(b=>b.text||'').join('');
          allCleaned.push(...cleanQuestions(parseQuestionJson(raw)));
        }catch(e){ /* silent — fall back to existing questions */ }
      }

      // Deduplicate against already-seen questions
      const seenSet=new Set((usedList||[]).slice(-60));
      allCleaned=allCleaned.filter(q=>{ if(seenSet.has(q.q)) return false; seenSet.add(q.q); return true; }).slice(0,count);

      if(allCleaned.length>0){
        quiz={...quiz,questions:allCleaned,usedQuestions:[...(quiz.usedQuestions||[]),...allCleaned.map(q=>q.q)].slice(-120)};
        await safeSet(`quiz-${quiz.id}`,quiz);
      }
    }catch(e){ /* fall back to existing questions */ }
  }

  const playQuestions=shuffle(quiz.questions).map(orig=>{
    const order=shuffle(orig.options.map((_,i)=>i));
    const correctIndex=order.indexOf(orig.correct);
    return{
      q:orig.q,
      options:order.map(i=>orig.options[i]),
      correctIndex: correctIndex >= 0 ? correctIndex : 0,
      explanation:orig.explanation||'',
      wrongReason:orig.wrongReason||''
    };
  });
  state.screen='play';
  state.play={quizId:quiz.id,section:quiz.section,topic:quiz.topic,questions:playQuestions,index:0,answers:new Array(playQuestions.length).fill(null)};
  renderPlay();
}



function renderPlay(){
  const p=state.play;
  const sec=sectionInfo(p.section);
  const total=p.questions.length;
  const q=p.questions[p.index];
  const answered=p.answers[p.index]; // null = unanswered, object = answered

  const tape=p.questions.map((_,i)=>{
    const a=p.answers[i];
    let cls='tape-seg';
    if(a!==null&&a) cls+=a.correct?' correct':' wrong';
    if(i===p.index) cls+=' current';
    return `<div class="${cls}" onclick="jumpToQuestion(${i})" title="Q${i+1}"></div>`;
  }).join('');

  const options=q.options.map((opt,i)=>{
    let cls='option-btn';
    let disabled='';
    if(answered!==null&&answered){
      disabled='disabled';
      if(i===q.correctIndex) cls+=' is-correct';
      else if(i===answered.selected) cls+=' is-wrong';
    }
    return `<button type="button" class="${cls}" ${disabled} onclick="selectAnswer(${i})">
      <span class="option-letter">${String.fromCharCode(65+i)}</span>
      <span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  let explainMsg='';
  if(answered!==null&&answered){
    if(answered.correct){
      explainMsg=`<div class="explain-box">
        <div class="explain-correct-block">
          <div class="explain-block-label correct-label">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="6" stroke="var(--green)" stroke-width="1.2"/><path d="M3.5 6.5l2 2 4-4" stroke="var(--green)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Correct
          </div>
          <div class="explain-answer-row">
            <span class="explain-answer-letter correct-letter">${String.fromCharCode(65+q.correctIndex)}</span>
            <span class="explain-answer-text">${escapeHtml(q.options[q.correctIndex])}</span>
          </div>
          ${q.explanation?`<div class="explain-reason">${escapeHtml(q.explanation)}</div>`:''}
        </div>
      </div>`;
    } else {
      const wrongIdx=answered.selected;
      const wrongOpt=q.options[wrongIdx];
      const correctOpt=q.options[q.correctIndex];
      const wrongReasonText=q.wrongReason||'This option may seem related but does not satisfy what the question is specifically asking.';
      explainMsg=`<div class="explain-box">
        <div class="explain-wrong-block">
          <div class="explain-block-label wrong-label">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="6" stroke="var(--rose)" stroke-width="1.2"/><path d="M4.5 4.5l4 4M8.5 4.5l-4 4" stroke="var(--rose)" stroke-width="1.4" stroke-linecap="round"/></svg>
            Your answer — Incorrect
          </div>
          <div class="explain-answer-row">
            <span class="explain-answer-letter wrong-letter">${String.fromCharCode(65+wrongIdx)}</span>
            <span class="explain-answer-text">${escapeHtml(wrongOpt)}</span>
          </div>
          <div class="explain-reason" style="margin-top:6px;">
            <span style="font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);display:block;margin-bottom:3px;">Why this is wrong</span>
            ${escapeHtml(wrongReasonText)}
          </div>
        </div>
        <div class="explain-correct-block">
          <div class="explain-block-label correct-label">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="6" stroke="var(--green)" stroke-width="1.2"/><path d="M3.5 6.5l2 2 4-4" stroke="var(--green)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Correct answer
          </div>
          <div class="explain-answer-row">
            <span class="explain-answer-letter correct-letter">${String.fromCharCode(65+q.correctIndex)}</span>
            <span class="explain-answer-text">${escapeHtml(correctOpt)}</span>
          </div>
          <div class="explain-reason" style="margin-top:6px;">
            <span style="font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--green);display:block;margin-bottom:3px;">Why this is correct</span>
            ${q.explanation?escapeHtml(q.explanation):'This is the answer directly supported by the study material.'}
          </div>
        </div>
      </div>`;
    }
  }
  const footBtn=(answered!==null&&answered)
    ?`<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.05em;">Press <b>Enter</b> to continue</span>
        <button class="btn btn-primary" onclick="nextQuestion()">${p.index+1===total?'See debrief →':'Next question →'}</button>
      </div>`
    :`<span style="font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.05em;">Press <b>1–4</b> to select an option</span>`;

  document.getElementById('app').innerHTML=`
    ${headerHtml('confirmAbandonQuiz')}
    <div class="play-top">
      <div class="play-info" style="color:${sec.acc}">
        <span style="background:${sec.acc};color:var(--ink);border-radius:5px;padding:2px 8px;font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:.08em;">${sec.code}</span>
        &nbsp;${escapeHtml(p.topic)}
      </div>
      <div class="play-counter">Q ${p.index+1} / ${total}</div>
    </div>
    <div class="progress-tape">${tape}</div>
    <div class="question-card">
      <div class="question-text">${escapeHtml(q.q)}</div>
      <div class="option-grid">${options}</div>
      ${explainMsg}
    </div>
    <div class="play-foot">${footBtn}</div>`;
}

function confirmAbandonQuiz(){
  const answered=state.play.answers.filter(a=>a!==null).length;
  if(answered===0){ clearPlayTimer(); goDashboard(); return; }
  showConfirm('Abandon quiz?','Your progress on this attempt will be lost.','Leave anyway','btn-danger',()=>{ clearPlayTimer(); goDashboard(); });
}

function clearPlayTimer(){
  // no-op kept so other callers don't break
}

/* Keyboard shortcuts in play screen: 1-4 select option, Enter/Space advance */
function _playKeyHandler(e){
  if(!state.play||state.screen!=='play') return;
  const p=state.play;
  const q=p.questions[p.index];
  const answered=p.answers[p.index];
  if(answered===null && e.key>='1' && e.key<='4'){
    const idx=parseInt(e.key,10)-1;
    if(idx<q.options.length){ e.preventDefault(); selectAnswer(idx); }
  } else if((e.key==='Enter'||e.key===' ') && answered!==null && answered){
    e.preventDefault(); nextQuestion();
  }
}
document.addEventListener('keydown', _playKeyHandler);

function jumpToQuestion(i){
  const p=state.play;
  const total=p.questions.length;
  if(i<0||i>=total) return;
  // Allow jumping to: already answered questions, current question, or the next unanswered one
  const nextUnanswered=p.answers.reduce((acc,a,idx)=>(a&&acc>idx)?acc:(!a&&idx<acc?idx:acc), total);
  const isAnswered=!!p.answers[i];
  const isCurrent=(i===p.index);
  const isNextAvailable=(i<=Math.min(nextUnanswered, p.index+1));
  if(isAnswered||isCurrent||isNextAvailable){
    p.index=i; renderPlay();
  }
}

function selectAnswer(i){
  const p=state.play;
  if(p.answers[p.index]!==null) return;
  const q=p.questions[p.index];
  const isCorrect=(i===q.correctIndex);
  p.answers[p.index]={selected:i,correct:isCorrect};
  renderPlay();
}

function nextQuestion(){
  const p=state.play;
  if(p.index+1<p.questions.length){ p.index+=1; renderPlay(); }
  else finishQuiz();
}

async function finishQuiz(){
  clearPlayTimer();
  const p=state.play;
  const total=p.questions.length;
  const correctCount=p.answers.filter(a=>a!==null&&a.correct).length;
  const percent=Math.round((correctCount/total)*100);

  const quiz=await safeGet(`quiz-${p.quizId}`);
  if(quiz){
    quiz.stats.attempts=(quiz.stats.attempts||0)+1;
    quiz.stats.lastScore=percent;
    quiz.stats.bestScore=Math.max(quiz.stats.bestScore||0,percent);
    quiz.stats.lastAt=Date.now();
    await safeSet(`quiz-${p.quizId}`,quiz);
  }
  const entry=state.quizzesIndex.find(q=>q.id===p.quizId);
  if(entry){
    entry.attempts=(entry.attempts||0)+1;
    entry.bestScore=Math.max(entry.bestScore||0,percent);
    entry.lastAt=Date.now();
    await safeSet('quizzes-index',state.quizzesIndex);
  }
  state.debrief={quizId:p.quizId,section:p.section,topic:p.topic,percent,correctCount,total,questions:p.questions,answers:p.answers};
  state.screen='debrief';
  renderDebrief();
}

/* ====== DEBRIEF ====== */
let _debriefFilter='all';
function renderDebrief(){
  const d=state.debrief;
  const sec=sectionInfo(d.section);
  const scoreCls=d.percent>=75?'good':d.percent>=45?'mid':'low';

  function buildReview(filter){
    return d.questions.map((q,i)=>{
      const a=d.answers[i];
      const ok=a!==null&&a&&a.correct;
      if(filter==='wrong'&&ok) return '';
      if(filter==='correct'&&!ok) return '';
      const wrongReasonText=(!ok&&q.wrongReason)?q.wrongReason:null;
      return `<div class="review-item">
        <div class="review-top">
          <span class="review-icon ${ok?'ok':'bad'}">${ok?'✓':'✕'}</span>
          <span class="review-q">${escapeHtml(q.q)}</span>
        </div>
        <div class="review-ans">
          ✓ Correct: <b>${escapeHtml(q.options[q.correctIndex])}</b>
          ${(!ok&&a&&a.selected>=0)?`<br>✕ Your answer: <b style="color:var(--rose)">${escapeHtml(q.options[a.selected])}</b>`:''}
        </div>
        ${wrongReasonText?`<div class="review-explain" style="color:var(--rose);margin-top:4px;">Why wrong: ${escapeHtml(wrongReasonText)}</div>`:''}
        ${q.explanation?`<div class="review-explain" style="margin-top:3px;">Why correct: ${escapeHtml(q.explanation)}</div>`:''}
      </div>`;
    }).join('');
  }

  const wrongCount=d.answers.filter(a=>a!==null&&!a.correct).length;
  const correctCount=d.correctCount;

  document.getElementById('app').innerHTML=`
    ${headerHtml('goDashboard')}
    <div class="debrief-head">
      ${gaugeSVG(d.percent,false)}
      <div class="debrief-stats">
        <div><div class="debrief-stat-val" style="color:var(--${scoreCls==='good'?'green':scoreCls==='mid'?'amber':'rose'})">${d.percent}%</div><div class="debrief-stat-label">Score</div></div>
        <div><div class="debrief-stat-val">${d.correctCount}/${d.total}</div><div class="debrief-stat-label">Correct</div></div>
        <div><div class="debrief-stat-val" style="color:${sec.acc}">${sec.code}</div><div class="debrief-stat-label">${escapeHtml(d.topic)}</div></div>
      </div>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab ${_debriefFilter==='all'?'active':''}" onclick="setDebriefFilter('all')">All (${d.total})</button>
      <button class="filter-tab ${_debriefFilter==='wrong'?'active':''}" onclick="setDebriefFilter('wrong')">Missed (${wrongCount})</button>
      <button class="filter-tab ${_debriefFilter==='correct'?'active':''}" onclick="setDebriefFilter('correct')">Correct (${correctCount})</button>
    </div>
    <div id="debrief-review">${buildReview(_debriefFilter)}</div>
    <div class="debrief-actions">
      <button class="btn btn-primary" onclick="startQuiz('${d.quizId}')">Play again</button>
      <button class="btn btn-ghost" onclick="goDashboard()">Back to Mission Control</button>
    </div>`;
}

function setDebriefFilter(f){
  _debriefFilter=f;
  renderDebrief();
}

let _newsQuizInFlight=false;
async function submitNewsQuiz(){
  if(_newsQuizInFlight) return;
  const topic=document.getElementById('newsquiz-topic').value.trim();
  const raw=document.getElementById('newsquiz-content').value.trim();
